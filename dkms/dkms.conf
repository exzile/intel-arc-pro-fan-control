# DKMS config for the patched `xe` driver (fan control + overclock).
#
# STATUS: BETA — validate on your machine before relying on it. DKMS normally
# builds a self-contained module against the kernel *headers*; this module
# instead patches the in-tree `xe` driver, which needs the full kernel *source*
# and the running kernel's real config (see docs/LINUX-BUILD.md for why). So the
# build is delegated to dkms-build.sh, which reproduces the verified recipe for
# the target $kernelver. That means the matching kernel SOURCE package must be
# installable for each kernel DKMS builds against.
#
# Install (see dkms/README.md):
#   sudo cp -r dkms /usr/src/xe-arc-<version>
#   sudo dkms add    xe-arc/<version>
#   sudo dkms build  xe-arc/<version>
#   sudo dkms install xe-arc/<version>      # then reboot
#
# On every kernel update, DKMS re-runs the build automatically.

PACKAGE_NAME="xe-arc"
PACKAGE_VERSION="0.1.0"

# The build is not a simple `make M=...`; hand it to the recipe script. DKMS
# exports $kernelver and runs this from the module source dir.
MAKE[0]="bash dkms-build.sh ${kernelver}"
CLEAN="rm -rf build-${kernelver}"

# We are REPLACING the in-tree xe. Modules under /updates win over
# kernel/drivers/gpu/drm/xe, so the patched build loads in preference.
BUILT_MODULE_NAME[0]="xe"
BUILT_MODULE_LOCATION[0]="build-${kernelver}"
DEST_MODULE_LOCATION[0]="/updates"

# Rebuild automatically on kernel updates.
AUTOINSTALL="yes"

# Do NOT strip signatures / this is an unsigned out-of-tree module; it will taint
# the kernel (harmless without Secure Boot / module.sig_enforce).
