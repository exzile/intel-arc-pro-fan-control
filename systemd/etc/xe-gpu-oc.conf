# GPU voltage-frequency curve overclock, re-applied at boot by xe-gpu-oc.service.
# Normally managed for you by `xe-gpu-oc offset` / `reset` and the GUI Overclock tab
# (they rewrite this file); you don't need to edit it by hand.
#
# VOLTAGE_OFFSET: mV offset from the stock curve — negative undervolts (e.g. -25),
#   positive overvolts (e.g. 30). "custom" means a per-point curve saved in
#   /var/lib/xe-gpu-oc/applied-curve is re-applied instead. 0 = stock (no-op).
VOLTAGE_OFFSET=0
