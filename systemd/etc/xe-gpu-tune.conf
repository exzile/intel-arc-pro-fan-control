# GPU tuning applied at boot by xe-gpu-tune.service (all optional; empty = hardware default).
# Edit, then: sudo systemctl restart xe-gpu-tune
#
# CLK_MIN: idle clock floor (MHz). 400 = hardware min -> GPU drops to 400 at idle to save
#          power/heat, still boosts to max under load. Pure win. (Default firmware floor is 1200.)
CLK_MIN=400
# CLK_MAX: clock ceiling (MHz). Empty = full 2400. Lower (e.g. 2000) for less heat/noise under load.
CLK_MAX=
# POWER_W: power cap in watts. Empty = default 200. Lower (e.g. 150) for a cooler/quieter card.
POWER_W=
